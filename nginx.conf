server {
    listen 443 ssl;
    server_name racore-mcp.verycloud.cn;

    # 你自己放在宿主机 /etc/cert/ 的证书（按实际文件名修改）
    ssl_certificate     /etc/cert/verycloud.cn.crt;
    ssl_certificate_key /etc/cert/verycloud.cn.key;

    # Docker 内置 DNS，配合下方变量式 proxy_pass 做请求时动态解析
    resolver 127.0.0.11 valid=10s;

    location /racorecdn/ {
        # 反代到 compose 内部网络中的 mcp 服务
        proxy_pass http://mcp:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式必需：关闭缓冲，保持 HTTP/1.1 长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # SSE 长连接超时（默认 60s 会掐断流式响应）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /racorebill/ {
        # 反代到另一套 compose 的 bill-mcp（经 shared-mcp 网络）
        # 用变量传主机名，避免 nginx 启动时解析 bill-mcp；
        # 这样 bill-mcp 未启动也不会拖垮 nginx，只有访问本路径才返回 502。
        set $bill_upstream bill-mcp;
        proxy_pass http://$bill_upstream:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式必需：关闭缓冲，保持 HTTP/1.1 长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # SSE 长连接超时（默认 60s 会掐断流式响应）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# HTTP 强制跳转 HTTPS
server {
    listen 80;
    server_name racore-mcp.verycloud.cn;
    return 301 https://$host$request_uri;
}
