server {
    listen 443 ssl;
    server_name racore-mcp.verycloud.cn;

    # 你自己放在宿主机 /etc/cert/ 的证书（按实际文件名修改）
    ssl_certificate     /etc/cert/verycloud.cn.crt;
    ssl_certificate_key /etc/cert/verycloud.cn.key;

    location /racorecdn/ {
        # 反代到 compose 内部网络中的 mcp 服务
        proxy_pass http://mcp:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式必需：关闭缓冲，保持 HTTP/1.1 长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # SSE 长连接超时（默认 60s 会掐断流式响应）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# HTTP 强制跳转 HTTPS
server {
    listen 80;
    server_name racore-mcp.verycloud.cn;
    return 301 https://$host$request_uri;
}
